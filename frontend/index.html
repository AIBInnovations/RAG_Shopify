<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopify AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="brand-selector" id="brand-selector">
        <div class="selector-header">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <h2>AI Shopping Assistant</h2>
            <p class="selector-subtitle">Choose a brand to start chatting</p>
        </div>
        <div class="brand-cards">
            <button class="brand-card" onclick="startSession('miloe')">
                <div class="brand-card-icon miloe-icon">M</div>
                <div class="brand-card-info">
                    <span class="brand-card-name">Miloe</span>
                    <span class="brand-card-desc">Bath & Body Care</span>
                </div>
                <svg class="brand-card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
            <button class="brand-card" onclick="startSession('cristello')">
                <div class="brand-card-icon cristello-icon">C</div>
                <div class="brand-card-info">
                    <span class="brand-card-name">Cristello</span>
                    <span class="brand-card-desc">Premium Skincare</span>
                </div>
                <svg class="brand-card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
        </div>
    </div>

    <div id="chat-widget" class="chat-widget hidden">

        <div class="chat-header">
            <div class="header-left">
                <div class="header-avatar" id="header-avatar">C</div>
                <div class="header-info">
                    <span class="brand-name" id="brand-title">AI Support</span>
                    <span class="status-text"><span class="status-dot"></span> Online</span>
                </div>
            </div>
            <button class="close-btn" onclick="closeChat()" title="Close chat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>

        <div id="chat-messages" class="chat-messages"></div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Ask about our products..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" aria-label="Send message" id="send-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
